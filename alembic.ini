# Alembic configuration file

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[alembic]
# path to migration scripts
script_location = alembic

# The SQLAlchemy connection string.
sqlalchemy.url = 

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be named with date and time
#file_template = %%(rev)d_%%(created_at)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the timezone info (UTC) and
# supplying the current time in migrations scripts
# Leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in %%(slug)s
# you can shorten this as needed if you wish to give the migration names more room
# (note the allowed length of migration file names is silently truncated
# if this value is exceeded)
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_command_checks_obj_signature = true

# set to 'true' to run the environment during
# the 'stamp' command, regardless of autogenerate
# stamp_command_checks_obj_signature = true
