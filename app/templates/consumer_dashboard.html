<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消费者中心 - MyShared</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        .header { background: #722ed1; color: #fff; padding: 0 24px; display: flex; align-items: center; height: 56px; justify-content: space-between; }
        .header h2 { font-size: 18px; }
        .header .user-info { display: flex; align-items: center; gap: 16px; font-size: 14px; }
        .header a { color: #fff; text-decoration: none; opacity: 0.8; }
        .header a:hover { opacity: 1; }
        .layout { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #f0f0f0; padding: 16px 0; }
        .sidebar .menu-item { padding: 12px 24px; cursor: pointer; font-size: 14px; color: #333; transition: all .2s; display: block; text-decoration: none; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #f9f0ff; color: #722ed1; }
        .content { flex: 1; padding: 24px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .card h3 { margin-bottom: 16px; font-size: 16px; color: #1a1a1a; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .stat-card .label { font-size: 13px; color: #999; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 600; color: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 500; color: #666; }
        .product-card { border: 1px solid #f0f0f0; border-radius: 8px; padding: 16px; margin-bottom: 12px; transition: box-shadow .2s; }
        .product-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-card .title { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
        .product-card .price { color: #f5222d; font-size: 18px; font-weight: 600; }
        .product-card .original-price { color: #999; text-decoration: line-through; font-size: 13px; margin-left: 8px; }
        .product-card .meta { color: #999; font-size: 13px; margin-top: 8px; }
        .btn-sm { padding: 4px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
        .btn-sm:hover { border-color: #722ed1; color: #722ed1; }
        .btn-primary-sm { padding: 6px 16px; border: none; border-radius: 4px; background: #722ed1; color: #fff; cursor: pointer; font-size: 13px; }
        .btn-primary-sm:hover { background: #9254de; }
        .section { display: none; }
        .section.active { display: block; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .tag { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 24px; width: 480px; max-width: 90vw; }
        .modal h3 { margin-bottom: 16px; }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 500; }
        .modal .form-group input { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🛍️ 消费者中心</h2>
        <div class="user-info">
            <span id="username-display"></span>
            <a href="/portal/logout">退出登录</a>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <div class="menu-item active" onclick="showSection('dashboard')">📊 概览</div>
            <div class="menu-item" onclick="showSection('products')">🛒 浏览商品</div>
            <div class="menu-item" onclick="showSection('subscriptions')">🔔 我的订阅</div>
            <div class="menu-item" onclick="showSection('myprofile')">👤 我的档案</div>
            <div class="menu-item" onclick="showSection('settings')">⚙️ 个人设置</div>
        </div>
        <div class="content">
            <!-- 概览 -->
            <div id="section-dashboard" class="section active">
                <div class="stats">
                    <div class="stat-card"><div class="label">我的订阅</div><div class="value" id="stat-subs">0</div></div>
                    <div class="stat-card"><div class="label">兴趣标签</div><div class="value" id="stat-tags">0</div></div>
                    <div class="stat-card"><div class="label">昵称</div><div class="value" id="stat-nickname" style="font-size:18px">-</div></div>
                </div>
                <div class="card">
                    <h3>推荐商品</h3>
                    <div id="recommended-products"><p class="empty">暂无推荐</p></div>
                </div>
            </div>

            <!-- 浏览商品 -->
            <div id="section-products" class="section">
                <div class="card">
                    <h3>全部商品</h3>
                    <div id="all-products-list"><p class="empty">加载中...</p></div>
                </div>
            </div>

            <!-- 我的订阅 -->
            <div id="section-subscriptions" class="section">
                <div class="card">
                    <h3>我的订阅 <button class="btn-primary-sm" style="float:right" onclick="showAddSubscription()">+ 新建订阅</button></h3>
                    <div id="subscriptions-list"><p class="empty">暂无订阅</p></div>
                </div>
            </div>

            <!-- 我的档案 -->
            <div id="section-myprofile" class="section">
                <div class="card">
                    <h3>消费者档案</h3>
                    <div id="consumer-profile-display"></div>
                    <div id="profile-not-created" style="display:none">
                        <p class="empty">您还没有创建消费者档案</p>
                        <div style="text-align:center;margin-top:16px">
                            <button class="btn-primary-sm" onclick="showCreateProfile()">创建档案</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 个人设置 -->
            <div id="section-settings" class="section">
                <div class="card">
                    <h3>账户信息</h3>
                    <div id="account-info"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建/编辑档案弹窗 -->
    <div id="modal-profile" class="modal-overlay">
        <div class="modal">
            <h3 id="profile-modal-title">创建消费者档案</h3>
            <div class="form-group"><label>昵称</label><input type="text" id="prof-nickname"></div>
            <div class="form-group"><label>头像URL</label><input type="text" id="prof-avatar"></div>
            <div class="form-group"><label>兴趣标签（逗号分隔）</label><input type="text" id="prof-tags" placeholder="电子产品,运动,美食"></div>
            <div class="modal-actions">
                <button class="btn-sm" onclick="closeModal('modal-profile')">取消</button>
                <button class="btn-primary-sm" id="profile-submit-btn" onclick="createProfile()">提交</button>
            </div>
        </div>
    </div>

    <!-- 新建订阅弹窗 -->
    <div id="modal-subscription" class="modal-overlay">
        <div class="modal">
            <h3>新建订阅</h3>
            <div class="form-group">
                <label>订阅类型</label>
                <select id="sub-type" style="width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;">
                    <option value="merchant">商户</option>
                    <option value="category">分类</option>
                    <option value="product">商品</option>
                </select>
            </div>
            <div class="form-group"><label>目标ID</label><input type="number" id="sub-target-id" placeholder="商户/分类/商品的ID"></div>
            <div class="modal-actions">
                <button class="btn-sm" onclick="closeModal('modal-subscription')">取消</button>
                <button class="btn-primary-sm" onclick="createSubscription()">订阅</button>
            </div>
        </div>
    </div>

    <script>
        const TOKEN = '{{token}}';
        const headers = {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN};

        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-'+name).classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event.target.classList.add('active');
            if (name === 'products') loadAllProducts();
            if (name === 'subscriptions') loadSubscriptions();
            if (name === 'myprofile') loadConsumerProfile();
            if (name === 'settings') loadAccountInfo();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function showCreateProfile() { document.getElementById('profile-modal-title').textContent='创建消费者档案'; document.getElementById('modal-profile').classList.add('show'); }
        function showAddSubscription() { document.getElementById('modal-subscription').classList.add('show'); }

        async function api(url, method='GET', body=null) {
            const opts = {method, headers};
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(url, opts);
            if (resp.status === 401) { window.location.href = '/portal/login'; return null; }
            if (!resp.ok) { const e = await resp.json().catch(()=>({})); alert(e.detail||'请求失败'); return null; }
            return resp.json();
        }

        async function init() {
            const user = await api('/users/me');
            if (!user) return;
            document.getElementById('username-display').textContent = user.username + '（消费者）';

            // Load profile stats
            const profile = await api('/consumers/profile').catch(()=>null);
            if (profile) {
                document.getElementById('stat-nickname').textContent = profile.nickname || user.username;
                document.getElementById('stat-tags').textContent = (profile.tags||[]).length;
            }

            // Load subscriptions count
            const subs = await api('/consumers/subscriptions').catch(()=>null);
            if (subs) {
                document.getElementById('stat-subs').textContent = subs.length;
            }
        }

        async function loadAllProducts() {
            const container = document.getElementById('all-products-list');
            // Try fetching a product by ID (we don't have a list endpoint, show guidance)
            container.innerHTML = `
                <p style="color:#666;margin-bottom:16px">输入商品ID查看详情：</p>
                <div style="display:flex;gap:10px;margin-bottom:20px">
                    <input type="number" id="search-product-id" placeholder="商品ID" style="padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;width:200px">
                    <button class="btn-primary-sm" onclick="searchProduct()">查看</button>
                </div>
                <div id="product-detail"></div>`;
        }

        async function searchProduct() {
            const id = document.getElementById('search-product-id').value;
            if (!id) return;
            const product = await api('/products/'+id);
            const container = document.getElementById('product-detail');
            if (!product) { container.innerHTML = '<p class="empty">商品不存在</p>'; return; }
            container.innerHTML = `
                <div class="product-card">
                    <div class="title">${product.name}</div>
                    <div><span class="price">¥${product.current_price}</span><span class="original-price">¥${product.original_price}</span></div>
                    <div class="meta">SKU: ${product.sku||'-'} | 库存: ${product.stock} | ID: ${product.id}</div>
                    <p style="margin-top:8px;color:#666">${product.description||'暂无描述'}</p>
                </div>`;
        }

        async function loadSubscriptions() {
            const subs = await api('/consumers/subscriptions');
            const container = document.getElementById('subscriptions-list');
            if (!subs || subs.length === 0) { container.innerHTML = '<p class="empty">暂无订阅</p>'; return; }
            let html = '<table><tr><th>ID</th><th>类型</th><th>状态</th><th>创建时间</th></tr>';
            subs.forEach(s => {
                html += `<tr><td>${s.id}</td><td>${s.subscription_type}</td><td>${s.is_active?'✅ 活跃':'❌ 停用'}</td><td>${new Date(s.created_at).toLocaleString()}</td></tr>`;
            });
            html += '</table>';
            container.innerHTML = html;
        }

        async function loadConsumerProfile() {
            const profile = await api('/consumers/profile');
            const display = document.getElementById('consumer-profile-display');
            const notCreated = document.getElementById('profile-not-created');
            if (!profile) { display.style.display='none'; notCreated.style.display='block'; return; }
            notCreated.style.display='none'; display.style.display='block';
            let tagsHtml = (profile.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
            display.innerHTML = `
                <table>
                    <tr><th width="120">昵称</th><td>${profile.nickname||'-'}</td></tr>
                    <tr><th>头像</th><td>${profile.avatar_url?'<img src="'+profile.avatar_url+'" width="48" style="border-radius:50%">':'无'}</td></tr>
                    <tr><th>兴趣标签</th><td><div class="tags">${tagsHtml||'无'}</div></td></tr>
                    <tr><th>创建时间</th><td>${new Date(profile.created_at).toLocaleString()}</td></tr>
                </table>
                <div style="margin-top:16px"><button class="btn-primary-sm" onclick="showEditProfile()">编辑档案</button></div>`;
        }

        function showEditProfile() {
            document.getElementById('profile-modal-title').textContent = '编辑消费者档案';
            document.getElementById('profile-submit-btn').setAttribute('onclick', 'updateProfile()');
            document.getElementById('modal-profile').classList.add('show');
        }

        async function createProfile() {
            const tags = document.getElementById('prof-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
            const data = {
                nickname: document.getElementById('prof-nickname').value,
                avatar_url: document.getElementById('prof-avatar').value || null,
                tags: tags
            };
            const result = await api('/consumers/profile', 'POST', data);
            if (result) { alert('档案创建成功！'); closeModal('modal-profile'); loadConsumerProfile(); }
        }

        async function updateProfile() {
            const tags = document.getElementById('prof-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
            const data = {
                nickname: document.getElementById('prof-nickname').value || null,
                avatar_url: document.getElementById('prof-avatar').value || null,
                tags: tags.length > 0 ? tags : null
            };
            const result = await api('/consumers/profile', 'PUT', data);
            if (result) { alert('档案更新成功！'); closeModal('modal-profile'); loadConsumerProfile(); }
        }

        async function createSubscription() {
            const type = document.getElementById('sub-type').value;
            const targetId = parseInt(document.getElementById('sub-target-id').value);
            if (!targetId) { alert('请输入目标ID'); return; }
            const data = { subscription_type: type };
            if (type === 'merchant') data.merchant_id = targetId;
            else if (type === 'category') data.category_id = targetId;
            else if (type === 'product') data.product_id = targetId;
            const result = await api('/consumers/subscriptions', 'POST', data);
            if (result) { alert('订阅成功！'); closeModal('modal-subscription'); loadSubscriptions(); }
        }

        async function loadAccountInfo() {
            const user = await api('/users/me');
            if (!user) return;
            document.getElementById('account-info').innerHTML = `
                <table>
                    <tr><th width="120">用户名</th><td>${user.username}</td></tr>
                    <tr><th>邮箱</th><td>${user.email}</td></tr>
                    <tr><th>角色</th><td>${user.role}</td></tr>
                    <tr><th>状态</th><td>${user.is_active?'✅ 活跃':'❌ 未激活'}</td></tr>
                    <tr><th>注册时间</th><td>${new Date(user.created_at).toLocaleString()}</td></tr>
                </table>`;
        }

        init();
    </script>
</body>
</html>
