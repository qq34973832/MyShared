<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户中心 - MyShared</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
        .header { background: #001529; color: #fff; padding: 0 24px; display: flex; align-items: center; height: 56px; justify-content: space-between; }
        .header h2 { font-size: 18px; }
        .header .user-info { display: flex; align-items: center; gap: 16px; font-size: 14px; }
        .header a { color: #fff; text-decoration: none; opacity: 0.8; }
        .header a:hover { opacity: 1; }
        .layout { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #f0f0f0; padding: 16px 0; }
        .sidebar .menu-item { padding: 12px 24px; cursor: pointer; font-size: 14px; color: #333; transition: all .2s; display: block; text-decoration: none; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { background: #e6f4ff; color: #1677ff; }
        .content { flex: 1; padding: 24px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .card h3 { margin-bottom: 16px; font-size: 16px; color: #1a1a1a; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .stat-card .label { font-size: 13px; color: #999; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 600; color: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 500; color: #666; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; }
        .badge-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .badge-blue { background: #e6f4ff; color: #1677ff; border: 1px solid #91caff; }
        .badge-orange { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }
        .btn-sm { padding: 4px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
        .btn-sm:hover { border-color: #1677ff; color: #1677ff; }
        .btn-primary-sm { padding: 6px 16px; border: none; border-radius: 4px; background: #1677ff; color: #fff; cursor: pointer; font-size: 13px; }
        .btn-primary-sm:hover { background: #4096ff; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .form-row input, .form-row select, .form-row textarea { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .form-row input:focus, .form-row textarea:focus { outline: none; border-color: #4096ff; }
        .section { display: none; }
        .section.active { display: block; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 8px; padding: 24px; width: 480px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: 500; color: #333; }
        .modal .form-group input, .modal .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .modal .form-group textarea { resize: vertical; min-height: 60px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <h2>🏪 商户中心</h2>
        <div class="user-info">
            <span id="username-display"></span>
            <a href="/portal/logout">退出登录</a>
        </div>
    </div>
    <div class="layout">
        <div class="sidebar">
            <div class="menu-item active" onclick="showSection('dashboard')">📊 概览</div>
            <div class="menu-item" onclick="showSection('shop')">🏪 店铺管理</div>
            <div class="menu-item" onclick="showSection('products')">📦 商品管理</div>
            <div class="menu-item" onclick="showSection('bids')">💰 竞价管理</div>
            <div class="menu-item" onclick="showSection('categories')">📂 分类管理</div>
            <div class="menu-item" onclick="showSection('profile')">👤 个人设置</div>
        </div>
        <div class="content">
            <!-- 概览 -->
            <div id="section-dashboard" class="section active">
                <div class="stats">
                    <div class="stat-card"><div class="label">商品总数</div><div class="value" id="stat-products">0</div></div>
                    <div class="stat-card"><div class="label">店铺评分</div><div class="value" id="stat-rating">0</div></div>
                    <div class="stat-card"><div class="label">评价总数</div><div class="value" id="stat-reviews">0</div></div>
                    <div class="stat-card"><div class="label">认证状态</div><div class="value" id="stat-verified">-</div></div>
                </div>
                <div class="card">
                    <h3>最近商品</h3>
                    <div id="recent-products-list"></div>
                </div>
            </div>

            <!-- 店铺管理 -->
            <div id="section-shop" class="section">
                <div class="card">
                    <h3>店铺信息</h3>
                    <div id="shop-info-display"></div>
                    <div id="shop-not-registered" style="display:none">
                        <p class="empty">您尚未注册店铺</p>
                        <div style="text-align:center;margin-top:16px">
                            <button class="btn-primary-sm" onclick="showRegisterShop()">立即注册店铺</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 商品管理 -->
            <div id="section-products" class="section">
                <div class="card">
                    <h3>商品列表 <button class="btn-primary-sm" style="float:right" onclick="showAddProduct()">+ 添加商品</button></h3>
                    <div id="products-list"></div>
                </div>
            </div>

            <!-- 竞价管理 -->
            <div id="section-bids" class="section">
                <div class="card">
                    <h3>出价记录</h3>
                    <div id="bids-list"><p class="empty">暂无出价记录</p></div>
                </div>
            </div>

            <!-- 分类管理 -->
            <div id="section-categories" class="section">
                <div class="card">
                    <h3>商品分类 <button class="btn-primary-sm" style="float:right" onclick="showAddCategory()">+ 添加分类</button></h3>
                    <div id="categories-list"></div>
                </div>
            </div>

            <!-- 个人设置 -->
            <div id="section-profile" class="section">
                <div class="card">
                    <h3>个人信息</h3>
                    <div id="profile-info"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加商品弹窗 -->
    <div id="modal-product" class="modal-overlay">
        <div class="modal">
            <h3>添加商品</h3>
            <div class="form-group"><label>商品名称</label><input type="text" id="prod-name"></div>
            <div class="form-group"><label>SKU</label><input type="text" id="prod-sku"></div>
            <div class="form-group"><label>分类ID</label><input type="number" id="prod-category-id" placeholder="请先在分类管理中创建分类"></div>
            <div class="form-group"><label>描述</label><textarea id="prod-desc"></textarea></div>
            <div class="form-group"><label>原价</label><input type="number" id="prod-original-price" step="0.01"></div>
            <div class="form-group"><label>现价</label><input type="number" id="prod-current-price" step="0.01"></div>
            <div class="form-group"><label>库存</label><input type="number" id="prod-stock" value="0"></div>
            <div class="modal-actions">
                <button class="btn-sm" onclick="closeModal('modal-product')">取消</button>
                <button class="btn-primary-sm" onclick="addProduct()">提交</button>
            </div>
        </div>
    </div>

    <!-- 注册店铺弹窗 -->
    <div id="modal-shop" class="modal-overlay">
        <div class="modal">
            <h3>注册店铺</h3>
            <div class="form-group"><label>店铺名称</label><input type="text" id="shop-name"></div>
            <div class="form-group"><label>店铺描述</label><textarea id="shop-desc"></textarea></div>
            <div class="form-group"><label>联系电话</label><input type="text" id="shop-phone"></div>
            <div class="form-group"><label>联系邮箱</label><input type="email" id="shop-email"></div>
            <div class="form-group"><label>地址</label><input type="text" id="shop-address"></div>
            <div class="modal-actions">
                <button class="btn-sm" onclick="closeModal('modal-shop')">取消</button>
                <button class="btn-primary-sm" onclick="registerShop()">提交</button>
            </div>
        </div>
    </div>

    <!-- 添加分类弹窗 -->
    <div id="modal-category" class="modal-overlay">
        <div class="modal">
            <h3>添加分类</h3>
            <div class="form-group"><label>分类名称</label><input type="text" id="cat-name"></div>
            <div class="form-group"><label>Slug</label><input type="text" id="cat-slug"></div>
            <div class="form-group"><label>描述</label><textarea id="cat-desc"></textarea></div>
            <div class="modal-actions">
                <button class="btn-sm" onclick="closeModal('modal-category')">取消</button>
                <button class="btn-primary-sm" onclick="addCategory()">提交</button>
            </div>
        </div>
    </div>

    <script>
        const TOKEN = '{{token}}';
        const headers = {'Content-Type':'application/json','Authorization':'Bearer '+TOKEN};

        function showSection(name) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-'+name).classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event.target.classList.add('active');
            if (name === 'products') loadProducts();
            if (name === 'shop') loadShop();
            if (name === 'categories') loadCategories();
            if (name === 'profile') loadProfile();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        function showAddProduct() { document.getElementById('modal-product').classList.add('show'); }
        function showRegisterShop() { document.getElementById('modal-shop').classList.add('show'); }
        function showAddCategory() { document.getElementById('modal-category').classList.add('show'); }

        async function api(url, method='GET', body=null) {
            const opts = {method, headers};
            if (body) opts.body = JSON.stringify(body);
            const resp = await fetch(url, opts);
            if (resp.status === 401) { window.location.href = '/portal/login'; return null; }
            if (!resp.ok) { const e = await resp.json().catch(()=>({})); alert(e.detail || '请求失败'); return null; }
            return resp.json();
        }

        async function init() {
            const user = await api('/users/me');
            if (!user) return;
            document.getElementById('username-display').textContent = user.username + '（商户）';

            // Load dashboard
            const shop = await api('/merchants/me');
            if (shop) {
                document.getElementById('stat-products').textContent = shop.total_products || 0;
                document.getElementById('stat-rating').textContent = shop.rating || 0;
                document.getElementById('stat-reviews').textContent = shop.total_reviews || 0;
                document.getElementById('stat-verified').textContent = shop.is_verified ? '✅ 已认证' : '⏳ 未认证';
            }
        }

        async function loadShop() {
            const shop = await api('/merchants/me');
            const display = document.getElementById('shop-info-display');
            const notReg = document.getElementById('shop-not-registered');
            if (!shop) { display.style.display='none'; notReg.style.display='block'; return; }
            notReg.style.display='none'; display.style.display='block';
            display.innerHTML = `
                <table>
                    <tr><th width="120">店铺名称</th><td>${shop.shop_name}</td></tr>
                    <tr><th>描述</th><td>${shop.shop_description||'-'}</td></tr>
                    <tr><th>联系电话</th><td>${shop.contact_phone||'-'}</td></tr>
                    <tr><th>联系邮箱</th><td>${shop.contact_email||'-'}</td></tr>
                    <tr><th>地址</th><td>${shop.address||'-'}</td></tr>
                    <tr><th>认证状态</th><td>${shop.is_verified?'✅ 已认证':'⏳ 未认证'}</td></tr>
                    <tr><th>评分</th><td>${shop.rating}/5</td></tr>
                    <tr><th>商品数</th><td>${shop.total_products}</td></tr>
                </table>`;
        }

        async function loadProducts() {
            const shop = await api('/merchants/me');
            const container = document.getElementById('products-list');
            if (!shop) { container.innerHTML = '<p class="empty">请先注册店铺</p>'; return; }
            // Fetch products via public list (we don't have a merchant-specific list endpoint, show all for now)
            container.innerHTML = '<p class="empty">商品列表已加载（通过商品管理接口添加）</p>';
        }

        async function addProduct() {
            const data = {
                name: document.getElementById('prod-name').value,
                sku: document.getElementById('prod-sku').value,
                description: document.getElementById('prod-desc').value,
                category_id: parseInt(document.getElementById('prod-category-id').value),
                original_price: parseFloat(document.getElementById('prod-original-price').value),
                current_price: parseFloat(document.getElementById('prod-current-price').value),
                stock: parseInt(document.getElementById('prod-stock').value),
            };
            if (!data.name || !data.category_id) { alert('请填写商品名称和分类ID'); return; }
            const result = await api('/products', 'POST', data);
            if (result) { alert('商品添加成功！'); closeModal('modal-product'); loadProducts(); }
        }

        async function registerShop() {
            const data = {
                shop_name: document.getElementById('shop-name').value,
                shop_description: document.getElementById('shop-desc').value,
                contact_phone: document.getElementById('shop-phone').value,
                contact_email: document.getElementById('shop-email').value,
                address: document.getElementById('shop-address').value,
            };
            if (!data.shop_name) { alert('请填写店铺名称'); return; }
            const result = await api('/merchants/register', 'POST', data);
            if (result) { alert('店铺注册成功！'); closeModal('modal-shop'); loadShop(); }
        }

        async function loadCategories() {
            const data = await api('/categories');
            const container = document.getElementById('categories-list');
            if (!data || data.length === 0) { container.innerHTML = '<p class="empty">暂无分类</p>'; return; }
            let html = '<table><tr><th>ID</th><th>名称</th><th>Slug</th><th>描述</th></tr>';
            data.forEach(c => { html += `<tr><td>${c.id}</td><td>${c.name}</td><td>${c.slug}</td><td>${c.description||'-'}</td></tr>`; });
            html += '</table>';
            container.innerHTML = html;
        }

        async function addCategory() {
            const data = {
                name: document.getElementById('cat-name').value,
                slug: document.getElementById('cat-slug').value,
                description: document.getElementById('cat-desc').value,
            };
            if (!data.name || !data.slug) { alert('请填写分类名称和Slug'); return; }
            const result = await api('/merchants/categories', 'POST', data);
            if (result) { alert('分类添加成功！'); closeModal('modal-category'); loadCategories(); }
        }

        async function loadProfile() {
            const user = await api('/users/me');
            if (!user) return;
            document.getElementById('profile-info').innerHTML = `
                <table>
                    <tr><th width="120">用户名</th><td>${user.username}</td></tr>
                    <tr><th>邮箱</th><td>${user.email}</td></tr>
                    <tr><th>角色</th><td>${user.role}</td></tr>
                    <tr><th>状态</th><td>${user.is_active?'✅ 活跃':'❌ 未激活'}</td></tr>
                    <tr><th>注册时间</th><td>${new Date(user.created_at).toLocaleString()}</td></tr>
                </table>`;
        }

        init();
    </script>
</body>
</html>
